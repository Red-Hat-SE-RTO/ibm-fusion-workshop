apiVersion: batch/v1
kind: Job
metadata:
  name: dcs-setup
  namespace: {{ .Values.dcsSetup.namespace }}
  labels:
    app.kubernetes.io/name: dcs-setup
    app.kubernetes.io/component: data-ingestion
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcs-setup
    spec:
      serviceAccountName: dcs-setup
      restartPolicy: OnFailure
      initContainers:
        - name: install-deps
          image: {{ .Values.dcsSetup.image }}
          command:
            - pip
            - install
            - --quiet
            - --target=/deps
            - boto3
            - requests
            - kubernetes
          volumeMounts:
            - name: deps
              mountPath: /deps
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: setup
          image: {{ .Values.dcsSetup.image }}
          command:
            - python3
            - /scripts/dcs-setup.py
          env:
            - name: PYTHONPATH
              value: /deps
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DCS_NAMESPACE
              value: {{ .Values.dcsSetup.namespace | quote }}
            - name: USER_NAMESPACE
              value: {{ .Values.dcsSetup.userNamespace | quote }}
            - name: CONNECTION_NAME
              value: {{ .Values.dcsSetup.connectionName | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.dcsSetup.clusterName | quote }}
            - name: BUCKET_PREFIX
              value: {{ .Values.dcsSetup.bucketPrefix | quote }}
            - name: S3_HOST
              value: {{ .Values.dcsSetup.s3Host | quote }}
            - name: STORAGE_CLASS_NOOBAA
              value: {{ .Values.dcsSetup.storageClassNoobaa | quote }}
            - name: DCS_ADMIN_USER
              value: {{ .Values.dcsSetup.dcsAdminUser | quote }}
            - name: DCS_ADMIN_PASSWORD_SECRET
              value: {{ .Values.dcsSetup.dcsAdminPasswordSecret | quote }}
            - name: DCS_ADMIN_PASSWORD_KEY
              value: {{ .Values.dcsSetup.dcsAdminPasswordKey | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: deps
              mountPath: /deps
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: scripts
          configMap:
            name: dcs-setup-script
        - name: deps
          emptyDir: {}
