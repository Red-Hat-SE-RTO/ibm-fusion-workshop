{{- range $user := .Values.users }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: {{ $.Values.workshopInfra.userNamespacePrefix }}-{{ $user }}
  labels:
    app.kubernetes.io/part-of: ibm-fusion-workshop
    workshop/user: "{{ $user }}"
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  policyTypes:
    - Ingress
{{- end }}
