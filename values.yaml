## ---------------------------------------------------------------------------
## IBM Storage Fusion & ODF Workshop - Central Configuration
## ---------------------------------------------------------------------------

deployer:
  domain: "apps.ocp.n7nzt.sandbox2765.opentlc.com"

# Git repository containing this chart (set after pushing to GitHub)
gitops:
  repoUrl: "https://github.com/Red-Hat-SE-RTO/ibm-fusion-workshop.git"
  revision: "main"

# Workshop users -- add/remove entries to scale the number of lab instances
users:
  - user1
  - user2
  - user3
  - user4
  - user5

argocd:
  namespace: "openshift-gitops"

components:
  showroom:
    enabled: true
    # Official showroom-deployer Helm chart from rhpds
    chartRepo: "https://rhpds.github.io/showroom-deployer"
    chartVersion: "1.3.4"
    content:
      repoUrl: "https://github.com/Red-Hat-SE-RTO/ibm-fusion-workshop.git"
      repoRef: "main"

  rhacm:
    enabled: true
    namespace: "open-cluster-management"
    channel: "release-2.14"
    source: "redhat-operators"
    sourceNamespace: "openshift-marketplace"

  workshopInfra:
    enabled: true
    userNamespacePrefix: "workshop"

  machineset:
    enabled: true
    instanceType: "m6a.4xlarge"
    replicas: 2
    vcpu: "16"
    memoryMb: "65536"
    region: "us-east-2"
    az: "us-east-2c"
    infraId: "ocp-wnb25"
    ami: "ami-0b9fcc2f8bed8771e"
    iamProfile: "ocp-wnb25-worker-profile"

  dcs:
    enabled: true
    fusionNamespace: "ibm-spectrum-fusion-ns"
    namespace: "ibm-data-cataloging"
    rwxStorageClass: "ocs-storagecluster-cephfs"

  lightspeed:
    enabled: true
    namespace: "openshift-lightspeed"
    channel: "stable"
    source: "redhat-operators"
    sourceNamespace: "openshift-marketplace"
    llmProvider: "openai"
    llmModel: "gpt-4o"
    apiKeySecretName: "openai-api-key"

# Cluster-specific variables passed to each user's Showroom via user_data
workshop:
  title: "Modern Hybrid Infrastructure: IBM Storage Fusion & OpenShift Data Foundation"
  openshift_console_url: "https://console-openshift-console.apps.ocp.n7nzt.sandbox2765.opentlc.com"
  fusion_ui_url: "https://console-ibm-spectrum-fusion-ns.apps.ocp.n7nzt.sandbox2765.opentlc.com"
  storage_class_rbd: "ocs-storagecluster-ceph-rbd"
  storage_class_rbd_virt: "ocs-storagecluster-ceph-rbd-virtualization"
  storage_class_cephfs: "ocs-storagecluster-cephfs"
  storage_class_noobaa: "openshift-storage.noobaa.io"
  fusion_namespace: "ibm-spectrum-fusion-ns"
  odf_namespace: "openshift-storage"
  dcs_namespace: "ibm-data-cataloging"
